name: AntropAi Brain Execution

on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 minutos (Totalmente Grátis)
  workflow_dispatch: # Permite que você ligue ele manualmente pelo botão

jobs:
  process_ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar Dependências (Onde o Termux sofreu, aqui ele voa)
        run: |
          pip install flask-cors wikipedia scikit-learn numpy requests

      - name: Rodar Inteligência Artificial
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }} # Você guarda o link do Firebase aqui
        run: |
          # Aqui ele roda um script que lê o Firebase, processa o ML e responde
          python process_queue.py
