name: AntropAi_Brain_Process

on:
  # Roda automaticamente a cada 5 minutos
  schedule:
    - cron: '*/5 * * * *'
  # Permite que você clique num botão para rodar na hora
  workflow_dispatch:

jobs:
  run_ai:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Pega o seu código do repositório
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Prepara o Python no servidor do GitHub
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Instala as bibliotecas necessárias (Sem erros de Termux aqui!)
      - name: Install Dependencies
        run: |
          pip install requests wikipedia scikit-learn numpy

      # 4. Executa o script que limpa a fila do Firebase
      - name: Execute Brain
        env:
          # Aqui o GitHub pega o que você salvou no "Key Secrets"
          # e entrega para o Python via variável de ambiente
          FB_URL: ${{ secrets.FIREBASE_URL }}
        run: python Pythons/process_queue.py
