name: AntropAi_Brain_v2
on:
  schedule:
    - cron: '*/5 * * * *' # Roda a cada 5 min
  workflow_dispatch:      # Botão manual

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install
        run: pip install requests wikipedia scikit-learn numpy
      - name: Run
        env:
          # Crie esse Secret no Settings do GitHub com o link do seu Firebase
          FB_URL: ${{ secrets.FIREBASE_URL }}
        run: python Pythons/process_queue.py
