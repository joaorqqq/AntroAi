<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntropAi</title>
    <style>
        :root {
            --bg: #000000;
            --sidebar: #111111;
            --accent: #00ff41;
            --text: #ffffff;
            --subtext: #888888;
            --input-bg: #1e1e1e;
            --file-pill: #2a2a2a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar & Menu */
        #sidebar {
            width: 280px; background: var(--sidebar); height: 100%;
            position: fixed; left: -280px; z-index: 1000;
            transition: 0.3s ease; display: flex; flex-direction: column; padding: 20px;
        }
        #sidebar.active { left: 0; }
        
        .menu-toggle {
            position: absolute; top: 20px; left: 20px; cursor: pointer; z-index: 500;
        }

        /* Main Content */
        #main {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; width: 100%;
        }

        .lobby-text { width: 100%; max-width: 500px; margin-bottom: 80px; }
        .greeting { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
        .sub-greeting { font-size: 32px; font-weight: 600; color: #333; }

        /* Input Area with File Preview */
        .bottom-ui {
            position: fixed; bottom: 30px; width: 92%; max-width: 650px;
            background: var(--input-bg); border-radius: 28px;
            padding: 10px 18px; border: 1px solid #333;
            display: flex; flex-direction: column; gap: 8px;
        }

        /* Balão do Arquivo Selecionado */
        #file-preview {
            display: none; align-items: center; gap: 10px;
            background: var(--file-pill); padding: 8px 12px;
            border-radius: 12px; width: fit-content; border: 1px solid #444;
        }
        .file-info { font-size: 13px; color: #fff; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .remove-file { color: #ff4444; font-weight: bold; cursor: pointer; margin-left: 5px; }

        .input-row { display: flex; align-items: center; width: 100%; }
        
        #prompt {
            background: transparent; border: none; color: white;
            flex-grow: 1; padding: 10px; font-size: 16px; outline: none;
        }

        /* Ícones Profissionais SVG */
        .svg-icon { width: 22px; height: 22px; fill: var(--subtext); cursor: pointer; transition: 0.2s; }
        .svg-icon:hover { fill: #fff; }
        .send-btn { fill: #444; width: 26px; height: 26px; }
        .send-btn.active { fill: var(--accent); }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 900;
        }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>
    
    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <p style="color:var(--accent); font-weight:bold; margin-bottom:20px;">AntropAi PRO</p>
        <div style="color:#555; font-size:12px;">RECENT CHATS</div>
        <div style="margin-top:auto; color:var(--accent); cursor:pointer;" onclick="location.href='login.html'">Logout</div>
    </div>

    <div id="main">
        <div class="lobby-text">
            <h1 class="greeting" id="user-display">Hello, User</h1>
            <h1 class="sub-greeting">How can I help you?</h1>
        </div>

        <div class="bottom-ui">
            <div id="file-preview">
                <svg width="16" height="16" fill="#4285f4" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span class="file-info" id="file-name">filename.txt</span>
                <span class="remove-file" onclick="clearFile()">×</span>
            </div>

            <div class="input-row">
                <label for="file-up">
                    <svg class="svg-icon" viewBox="0 0 24 24" style="margin-right:10px;"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
                </label>
                <input type="file" id="file-up" style="display:none" onchange="handleFileUpload(this)">
                
                <input type="text" id="prompt" placeholder="Message AntropAi..." oninput="checkInput()">
                
                <svg class="svg-icon" style="margin-right:12px;" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                
                <svg id="send-icon" class="svg-icon send-btn" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </div>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('antrop_user') || 'User';
        document.getElementById('user-display').innerText = `Hello, ${user}`;

        function handleFileUpload(input) {
            const preview = document.getElementById('file-preview');
            const nameSpan = document.getElementById('file-name');
            if (input.files && input.files[0]) {
                nameSpan.innerText = input.files[0].name;
                preview.style.display = 'flex'; // Torna o ícone visível
            }
        }

        function clearFile() {
            document.getElementById('file-up').value = "";
            document.getElementById('file-preview').style.display = 'none';
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function checkInput() {
            const prompt = document.getElementById('prompt');
            const send = document.getElementById('send-icon');
            send.classList.toggle('active', prompt.value.length > 0);
        }

        if (localStorage.getItem('is_logged') !== 'true') window.location.href = 'index.html';
    </script>
</body>
</html>
