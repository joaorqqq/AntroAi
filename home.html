<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntropAi | Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; border: 1px solid #00ff41; background: #000; overflow-y: auto; padding: 15px; margin-bottom: 20px; box-shadow: inset 0 0 10px #00ff41; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #008f11; box-shadow: 0 0 15px #00ff41; }
        .line { margin-bottom: 10px; line-height: 1.4; }
        .user { color: #fff; }
        .ai { color: #00ff41; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 0.7; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="chat-box">
        <div class="line">[SISTEMA] AntropAi v2.0 Online. Aguardando input...</div>
    </div>

    <div class="input-group">
        <input type="text" id="userInput" placeholder="Digite sua dúvida ou comando..." onkeypress="if(event.key==='Enter') enviar()">
        <button onclick="enviar()">EXECUTAR</button>
    </div>

    <script>
        // --- OFUSCAÇÃO DO FIREBASE ---
        // O link abaixo é o seu Firebase codificado em Base64
        const _0xkey = "aHR0cHM6Ly9hbGVhdG9yaWEtNGNkNDYtZGVmYXVsdC1ydGRiLmZpcmViYXNlaW8uY29tLw==";
        
        const config = { databaseURL: atob(_0xkey) };
        firebase.initializeApp(config);
        const db = firebase.database();

        const chatBox = document.getElementById('chat-box');

        function addLog(autor, msg, classe) {
            const div = document.createElement('div');
            div.className = 'line ' + classe;
            div.innerHTML = `<strong>[${autor}]:</strong> ${msg}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function enviar() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            
            if (!msg) return;

            addLog("VOCÊ", msg, "user");
            input.value = "";

            // 1. Enviar para a fila do Firebase (Queue)
            const novaPergunta = db.ref('queue').push();
            await novaPergunta.set({
                message: msg,
                status: "pending",
                timestamp: Date.now()
            });

            addLog("SISTEMA", "Enviado para o cérebro (GitHub Actions)...", "ai");

            // 2. Ouvir a resposta em tempo real
            novaPergunta.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.status === "completed") {
                    addLog("ANTROPAI", data.response, "ai");
                    
                    // Opcional: Remover da fila para não poluir o banco
                    novaPergunta.off(); // Para de ouvir
                    novaPergunta.remove();
                }
            });
        }
    </script>
</body>
</html>
