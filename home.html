<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntroAi</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg: #0b000b;          /* Fundo roxo quase preto */
            --sidebar: #1a001a;    /* Sidebar roxa escura */
            --accent: #ff0040;     /* Vermelho neon */
            --text: #ffffff;
            --subtext: #884488;    /* Subtexto arroxeado */
            --input-bg: #220022;   /* Input roxo escuro */
            --ai-gradient: linear-gradient(45deg, #ff0040, #7a00ff); /* Vermelho -> Roxo */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 280px; background: var(--sidebar); height: 100%;
            position: fixed; left: -280px; z-index: 1000;
            transition: 0.3s ease; display: flex; flex-direction: column; padding: 20px;
            border-right: 1px solid #330033;
        }
        #sidebar.active { left: 0; }
        
        .menu-toggle { position: absolute; top: 20px; left: 20px; cursor: pointer; z-index: 500; }

        .new-chat-sidebar {
            background: #2a002a; padding: 12px; border-radius: 12px;
            text-align: center; font-size: 14px; margin-top: 50px;
            margin-bottom: 20px; cursor: pointer; border: 1px solid #440044;
            font-weight: bold; color: #fff;
        }

        /* Main Content */
        #main {
            flex-grow: 1; display: flex; flex-direction: column;
            padding: 20px; width: 100%; height: 100vh; position: relative;
        }

        #chat-container {
            flex-grow: 1; overflow-y: auto; width: 100%;
            max-width: 800px; margin: 60px auto 140px auto;
            display: flex; flex-direction: column; gap: 25px;
            padding: 10px;
        }

        /* Estilo das Mensagens */
        .message { margin-bottom: 5px; animation: fadeIn 0.3s ease; }
        .user-label { color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; font-size: 12px; }
        .ai-label { 
            background: var(--ai-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold; display: block; margin-bottom: 5px; font-size: 12px;
        }
        .msg-content { color: #e0e0e0; font-size: 16px; line-height: 1.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Lobby */
        #lobby {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%); text-align: left; width: 90%; max-width: 550px;
        }
        .greeting { font-size: 40px; font-weight: 600; letter-spacing: -1px; }
        .sub-greeting { font-size: 40px; font-weight: 600; color: #220022; }

        /* Input Area */
        .bottom-ui {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 700px; background: var(--input-bg);
            border-radius: 24px; padding: 12px 20px; border: 1px solid #440044;
            display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }

        .input-row { display: flex; align-items: center; width: 100%; gap: 12px; }
        #prompt { background: transparent; border: none; color: white; flex-grow: 1; padding: 5px; font-size: 16px; outline: none; }

        .svg-icon { width: 24px; height: 24px; fill: var(--subtext); cursor: pointer; transition: 0.2s; }
        .svg-icon:hover { fill: #fff; }
        .send-btn { fill: #330033; }
        .send-btn.active { fill: var(--accent); cursor: pointer; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 900; }
    </style>
</head>
<body>

    <div class="menu-toggle" onclick="toggleMenu()">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>
    
    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <div class="new-chat-sidebar" onclick="newChat()">+ New Chat</div>
        <p style="color:var(--accent); font-weight:bold; margin-bottom:20px; font-size: 18px;">AntroAi</p>
        <div style="color:#440044; font-size:11px; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px;">HISTORY</div>
        <div id="history-list" style="color:#664466; font-size: 13px;">No recent activity.</div>
        
        <div style="margin-top:auto; padding-top: 20px; border-top: 1px solid #220022;">
            <div style="color:var(--accent); cursor:pointer; font-size: 14px;" onclick="logout()">Sign Out</div>
        </div>
    </div>

    <div id="main">
        <div id="lobby">
            <h1 class="greeting" id="user-display">Hello, User</h1>
            <h1 class="sub-greeting">How can I help you today?</h1>
        </div>

        <div id="chat-container"></div>

        <div class="bottom-ui">
            <div class="input-row">
                <input type="text" id="prompt" placeholder="Ask anything to AntroAi..." oninput="checkInput()" onkeydown="if(event.key==='Enter') triggerIA()">
                <svg id="send-icon" class="svg-icon send-btn" viewBox="0 0 24 24" onclick="triggerIA()"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const _0xdb = "aHR0cHM6Ly9hbGVhdG9yaWEtNGNkNDYtZGVmYXVsdC1ydGRiLmZpcmViYXNlaW8uY29tLw==";
        firebase.initializeApp({ databaseURL: atob(_0xdb) });
        const db = firebase.database();

        const userName = localStorage.getItem('antrop_user') || 'User';
        document.getElementById('user-display').innerText = `Hello, ${userName}`;

        function appendMessage(sender, text) {
            const container = document.getElementById('chat-container');
            const isAI = sender === "AntroAi";
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <span class="${isAI ? 'ai-label' : 'user-label'}">${sender.toUpperCase()}</span>
                <div class="msg-content">${text}</div>
            `;
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function triggerIA() {
            const input = document.getElementById('prompt');
            const msg = input.value.trim();
            if (!msg) return;

            document.getElementById('lobby').style.display = 'none';
            appendMessage(userName, msg);
            input.value = "";
            checkInput();

            const ref = db.ref('queue').push();
            await ref.set({ message: msg, status: "pending", time: Date.now() });

            ref.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.status === "completed") {
                    appendMessage("AntroAi", data.response);
                    ref.off();
                    ref.remove();
                }
            });
        }

        function toggleMenu() {
            const active = document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = active ? 'block' : 'none';
        }

        function checkInput() {
            const prompt = document.getElementById('prompt');
            const send = document.getElementById('send-icon');
            send.classList.toggle('active', prompt.value.length > 0);
        }

        function newChat() {
            document.getElementById('chat-container').innerHTML = "";
            document.getElementById('lobby').style.display = 'block';
            if (window.innerWidth < 768) toggleMenu();
        }

        function logout() {
            localStorage.removeItem('is_logged');
            window.location.href = 'index.html';
        }

        if (localStorage.getItem('is_logged') !== 'true') window.location.href = 'index.html';
    </script>
</body>
</html>
