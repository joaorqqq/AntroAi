<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntroAi</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <style>
        :root {
            --bg:#0b000b; --sidebar:#1a001a; --accent:#ff0040;
            --text:#ffffff; --subtext:#884488; --input-bg:#220022;
            --ai-gradient:linear-gradient(45deg,#ff0040,#7a00ff);
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); font-family:'Segoe UI',Roboto,sans-serif; height:100vh; display:flex; overflow:hidden; flex-direction:column; }

        .app-body { display:flex; flex:1; overflow:hidden; position:relative; }

        #sidebar { width:280px; background:var(--sidebar); height:100%; position:fixed; left:-280px; z-index:1000; transition:0.3s ease; display:flex; flex-direction:column; padding:20px; border-right:1px solid #330033; }
        #sidebar.active { left:0; }
        .menu-toggle { position:absolute; top:20px; left:20px; cursor:pointer; z-index:500; }
        .new-chat-btn { background:#2a002a; padding:12px; border-radius:12px; text-align:center; font-size:14px; margin-top:50px; margin-bottom:14px; cursor:pointer; border:1px solid #440044; font-weight:bold; color:#fff; }
        
        #history-section { flex:1; overflow-y:auto; margin-top:10px; }
        .history-item { padding:10px 12px; border-radius:8px; cursor:pointer; border:1px solid transparent; margin-bottom:4px; transition:all 0.2s; }
        .history-item:hover { background:#2a002a; border-color:#440044; }
        .history-item.active { background:#2a002a; border-color:#660033; }

        #main { flex-grow:1; display:flex; flex-direction:column; padding:20px; width:100%; height:100%; position:relative; }
        #chat-container { flex-grow:1; overflow-y:auto; width:100%; max-width:800px; margin:60px auto 140px auto; display:flex; flex-direction:column; gap:20px; padding:10px; }
        
        .message { animation:fadeIn 0.3s ease; margin-bottom: 20px; }
        .user-label { color:var(--accent); font-weight:bold; display:block; margin-bottom:5px; font-size:12px; }
        .ai-label { background:var(--ai-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:bold; display:block; margin-bottom:5px; font-size:12px; }
        .msg-content { color:#e0e0e0; font-size:15px; line-height:1.7; word-wrap:break-word; }
        
        .code-block { background:#0d000d; border:1px solid #2a002a; border-radius:12px; margin:10px 0; overflow:hidden; }
        .hljs { background:transparent !important; padding:14px 16px !important; font-size:13px !important; }

        .bottom-ui { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); width:92%; max-width:700px; background:var(--input-bg); border-radius:24px; padding:12px 20px; border:1px solid #440044; display:flex; align-items:center; gap:10px; z-index:100; }
        #prompt { background:transparent; border:none; color:white; flex-grow:1; padding:5px; font-size:16px; outline:none; }
        .svg-icon { width:24px; height:24px; fill:var(--subtext); cursor:pointer; }
        .send-btn.active { fill:var(--accent); }
        
        #overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:900; }
        
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>
<body>

<div class="app-body">
    <div class="menu-toggle" onclick="toggleMenu()">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="sidebar">
        <div class="new-chat-btn" onclick="newChat()">+ New Chat</div>
        <p style="color:var(--accent);font-weight:bold;margin-bottom:8px;font-size:18px;">AntroAi</p>
        <div id="history-section">
            <div id="history-list"></div>
        </div>
    </div>

    <div id="main">
        <div id="chat-container"></div>
        <div class="bottom-ui">
            <input type="text" id="prompt" placeholder="Digite sua mensagem..." oninput="checkInput()" onkeydown="if(event.key==='Enter') triggerIA()">
            <svg id="send-icon" class="svg-icon" viewBox="0 0 24 24" onclick="triggerIA()"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </div>
    </div>
</div>

<script>
// CONFIGURAÇÕES
const FIREBASE_URL = "https://aleatoria-4cd46-default-rtdb.firebaseio.io.com/"; 
const VERCEL_URL = "https://antro-proxy.vercel.app/api/v1";

const userUID = localStorage.getItem('antro_uid') || 'guest';
const safeUID = userUID.replace(/[.@\/]/g,'_');
let currentChatId = null;
let isLoading = false;

// INICIALIZAR FIREBASE
firebase.initializeApp({ databaseURL: FIREBASE_URL });
const db = firebase.database();

// RENDERIZAR MENSAGENS
function parseMessage(text) {
    return marked.parse(text);
}

function appendMessage(sender, text) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    div.className = 'message';
    const label = sender === "AntroAi" ? "ai-label" : "user-label";
    div.innerHTML = `<span class="${label}">${sender.toUpperCase()}</span><div class="msg-content">${parseMessage(text)}</div>`;
    container.appendChild(div);
    div.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
    container.scrollTop = container.scrollHeight;
}

// LOGICA PRINCIPAL
async function triggerIA() {
    if(isLoading) return;
    const input = document.getElementById('prompt');
    const msg = input.value.trim();
    if(!msg) return;

    if(!currentChatId) currentChatId = 'chat_' + Date.now();

    // 1. Mostrar e Salvar Mensagem do Usuário no Firebase
    appendMessage("Você", msg);
    saveToFirebase(currentChatId, "User", msg);
    
    input.value = '';
    setLoading(true);

    try {
        // 2. Chamar Vercel (A Vercel só gera o texto e devolve)
        const response = await fetch(VERCEL_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: "chat_ai", message: msg })
        });

        const data = await response.json();

        if (data.sucesso) {
            // 3. Mostrar Resposta e Salvar no Firebase (pelo Front-end)
            appendMessage("AntroAi", data.resposta);
            saveToFirebase(currentChatId, "AntroAi", data.resposta);
        } else {
            appendMessage("Sistema", "Erro ao processar resposta.");
        }
    } catch (e) {
        appendMessage("Sistema", "Falha de conexão com o servidor.");
    } finally {
        setLoading(false);
    }
}

// SALVAMENTO NO FIREBASE (FRONT-END APENAS)
function saveToFirebase(chatId, sender, text) {
    const ref = db.ref(`users/${safeUID}/chats/${chatId}/messages`).push();
    ref.set({
        sender: sender,
        text: text,
        time: Date.now()
    });

    db.ref(`users/${safeUID}/chats/${chatId}/info`).update({
        title: text.slice(0, 30) + "...",
        lastUpdate: Date.now()
    });
}

// FUNÇÕES DE UI
function setLoading(on) {
    isLoading = on;
    document.getElementById('prompt').disabled = on;
}

function checkInput() {
    const hasText = document.getElementById('prompt').value.length > 0;
    document.getElementById('send-icon').classList.toggle('active', hasText);
}

function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('overlay').style.display = 
        document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
}

function newChat() {
    currentChatId = null;
    document.getElementById('chat-container').innerHTML = '';
}

// SINCRONIZAR HISTÓRICO
function syncHistory() {
    db.ref(`users/${safeUID}/chats`).on('value', (snap) => {
        const chats = snap.val();
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        if(!chats) return;

        Object.keys(chats).reverse().forEach(id => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerText = chats[id].info.title;
            div.onclick = () => loadChat(id);
            list.appendChild(div);
        });
    });
}

function loadChat(id) {
    currentChatId = id;
    const container = document.getElementById('chat-container');
    container.innerHTML = '';
    db.ref(`users/${safeUID}/chats/${id}/messages`).once('value', (snap) => {
        const msgs = snap.val();
        if(msgs) {
            Object.values(msgs).forEach(m => appendMessage(m.sender, m.text));
        }
    });
    toggleMenu();
}

syncHistory();
</script>
</body>
</html>
