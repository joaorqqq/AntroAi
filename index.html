<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntroAi | Entrar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0b000b; --accent:#ff0040; --ai-gradient:linear-gradient(45deg,#ff0040,#7a00ff); --card:#130013; --border:#2a002a; --input-bg:#1a001a; --text:#fff; --subtext:#664466; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; animation:drift 8s ease-in-out infinite alternate; }
        .orb-1 { width:350px; height:350px; background:radial-gradient(circle,rgba(122,0,255,0.18) 0%,transparent 70%); top:-80px; right:-80px; }
        .orb-2 { width:300px; height:300px; background:radial-gradient(circle,rgba(255,0,64,0.12) 0%,transparent 70%); bottom:-60px; left:-60px; animation-delay:-4s; }
        @keyframes drift { from{transform:scale(1) translateY(0);} to{transform:scale(1.1) translateY(-20px);} }

        .card { position:relative; z-index:10; background:var(--card); border:1px solid var(--border); border-radius:28px; padding:40px 36px; width:360px; box-shadow:0 0 60px rgba(122,0,255,0.1); animation:slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px) scale(0.97);} to{opacity:1;transform:translateY(0) scale(1);} }

        .logo { text-align:center; margin-bottom:26px; }
        .logo-text { font-size:26px; font-weight:800; }
        .logo-text .grad { background:var(--ai-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logo-sub { font-family:'DM Mono',monospace; font-size:10px; color:var(--subtext); letter-spacing:3px; margin-top:4px; text-transform:uppercase; }

        .tabs { display:flex; background:var(--input-bg); border-radius:14px; padding:4px; margin-bottom:20px; border:1px solid var(--border); }
        .tab { flex:1; text-align:center; padding:9px; border-radius:10px; cursor:pointer; font-size:11px; font-weight:700; letter-spacing:1.5px; color:var(--subtext); transition:all 0.25s; user-select:none; }
        .tab.active { background:var(--border); color:var(--text); }

        .btn-google { width:100%; background:#fff; color:#3c3c3c; border:none; padding:13px 18px; border-radius:14px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:16px; box-shadow:0 2px 12px rgba(0,0,0,0.3); }
        .btn-google:hover { background:#f0f0f0; transform:translateY(-1px); }

        .divider { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
        .divider-line { flex:1; height:1px; background:var(--border); }
        .divider-text { font-family:'DM Mono',monospace; font-size:10px; color:var(--subtext); letter-spacing:2px; }

        .form { display:flex; flex-direction:column; gap:10px; }
        .hidden { display:none !important; }
        .input-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--subtext); text-transform:uppercase; margin-bottom:5px; display:block; }
        input { width:100%; background:var(--input-bg); border:1px solid var(--border); border-radius:12px; padding:13px 16px; color:var(--text); font-family:'DM Mono',monospace; font-size:13px; outline:none; transition:border-color 0.2s; }
        input::placeholder { color:#3a003a; }
        input:focus { border-color:#440044; }
        input.field-ok  { border-color:#00cc66; }
        input.field-err { border-color:var(--accent); }

        .field-hint { font-family:'DM Mono',monospace; font-size:10px; min-height:14px; margin-top:3px; padding-left:4px; }
        .field-hint.ok  { color:#00cc66; }
        .field-hint.err { color:var(--accent); }

        .error-msg { font-family:'DM Mono',monospace; font-size:11px; color:var(--accent); text-align:center; min-height:14px; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
        .shake { animation:shake 0.3s ease; }

        .btn { width:100%; background:var(--ai-gradient); color:#fff; border:none; padding:14px; border-radius:12px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:opacity 0.2s,transform 0.15s; box-shadow:0 4px 24px rgba(255,0,64,0.2); margin-top:4px; }
        .btn:hover { opacity:0.9; transform:translateY(-1px); }
        .btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; }

        /* Name picker overlay */
        #name-overlay { display:none; position:fixed; inset:0; background:rgba(11,0,11,0.92); z-index:2000; align-items:center; justify-content:center; padding:20px; }
        #name-overlay.show { display:flex; }
        .name-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:36px 32px; width:100%; max-width:340px; box-shadow:0 0 50px rgba(255,0,64,0.1); animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1); }
        .name-card-title { background:var(--ai-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-size:18px; font-weight:800; margin-bottom:6px; }
        .name-card-sub { font-size:12px; color:var(--subtext); margin-bottom:22px; line-height:1.5; }

        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(11,0,11,0.85); z-index:1500; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
        .loading-overlay.show { display:flex; }
        .spinner { width:40px; height:40px; border:3px solid #330033; border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to{transform:rotate(360deg);} }
        .loading-text { font-family:'DM Mono',monospace; font-size:12px; color:var(--subtext); }

        .footer-note { font-family:'DM Mono',monospace; font-size:10px; color:#2a002a; text-align:center; margin-top:18px; }
    </style>
<script>
    function _loadFirebase(cb) {
        var url = decodeURIComponent(escape(atob("aHR0cHM6Ly9naXN0LmdpdGh1YnVzZXJjb250ZW50LmNvbS9qb2FvcnFxcS9hMGVlOWJhMzkwODdmMGYwMDQwYzlmZmQwMDkyMTRiZi9yYXcvZTE1ZWE3NmJjMDg4MWY4MjQ5ZTMwZjFkYjQzZjk1ZTQzZDUwYmU1YS9GaXJlYmFzZS50eHQ=")));
        fetch(url)
            .then(function(r) { return r.text(); })
            .then(function(code) { eval(code); cb(); })
            .catch(function(e) { console.error("Erro ao carregar config:", e); });
    }
</script>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Entrando...</div>
</div>

<!-- Name picker (Google first time) -->
<div id="name-overlay">
    <div class="name-card">
        <div class="name-card-title" style="display:flex;align-items:center;gap:8px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="url(#ng)"><defs><linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#ff0040"/><stop offset="100%" style="stop-color:#7a00ff"/></linearGradient></defs><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg> Bem-vindo!</div>
        <div class="name-card-sub">É sua primeira vez aqui. Escolha um nome de usuário único para sua conta.</div>
        <label class="input-label">Nome de usuário</label>
        <input type="text" id="g-name" placeholder="Joãozinho Do Grau" oninput="checkGoogleName()" onkeydown="if(event.key==='Enter') confirmGoogleName()">
        <div class="field-hint" id="g-name-hint"></div>
        <div id="g-name-err" class="error-msg" style="margin-top:8px;"></div>
        <button class="btn" id="g-name-btn" onclick="confirmGoogleName()" style="margin-top:14px;" disabled>Confirmar</button>
    </div>
</div>

<div class="card">
    <div class="logo">
        <div class="logo-text">Antrop<span class="grad">Ai</span></div>
        <div class="logo-sub">Your personal intelligence</div>
    </div>

    <div class="tabs">
        <div id="t-login" class="tab active" onclick="switchTab('login')">LOGIN</div>
        <div id="t-reg"   class="tab"        onclick="switchTab('reg')">CADASTRO</div>
    </div>

    <button class="btn-google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Entrar com Google
    </button>

    <div class="divider"><div class="divider-line"></div><div class="divider-text">OU</div><div class="divider-line"></div></div>

    <!-- LOGIN -->
    <div id="f-login" class="form">
        <div>
            <label class="input-label">E-mail</label>
            <input type="email" id="l-email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div>
            <label class="input-label">Senha</label>
            <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div id="login-err" class="error-msg"></div>
        <button class="btn" onclick="doLogin()">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="f-reg" class="form hidden">
        <div>
            <label class="input-label">Nome de usuário</label>
            <input type="text" id="r-name" placeholder="Joãozinho Do Grau" oninput="debounce('name', checkRegName)">
            <div class="field-hint" id="r-name-hint"></div>
        </div>
        <div>
            <label class="input-label">E-mail</label>
            <input type="email" id="r-email" placeholder="seu@email.com" oninput="debounce('email', checkRegEmail)">
            <div class="field-hint" id="r-email-hint"></div>
        </div>
        <div>
            <label class="input-label">Senha (mín. 8 caracteres)</label>
            <input type="password" id="r-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doRegister()">
        </div>
        <div id="reg-err" class="error-msg"></div>
        <button class="btn" id="reg-btn" onclick="doRegister()">Criar Conta</button>
    </div>

    <div class="footer-note">AntropTeam · v1.0.0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-auth.js"></script>
<script>
// Firebase será inicializado após carregar URL do Gist
let db, auth;
_loadFirebase(function() {
    firebase.initializeApp({
        databaseURL: FIREBASE_URL,
        apiKey: "SUA_API_KEY_AQUI",
        authDomain: "SEU_PROJECT_ID.firebaseapp.com",
        projectId: "SEU_PROJECT_ID"
    });
    db   = firebase.database();
    auth = firebase.auth();
});

// Auto-login
if (localStorage.getItem('is_logged') === 'true' && localStorage.getItem('antro_user')) {
    window.location.replace('home.html');
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(tab) {
    document.getElementById('f-login').classList.toggle('hidden', tab === 'reg');
    document.getElementById('f-reg').classList.toggle('hidden', tab === 'login');
    document.getElementById('t-login').classList.toggle('active', tab === 'login');
    document.getElementById('t-reg').classList.toggle('active', tab === 'reg');
}

function showLoading(on, txt = 'Entrando...') {
    document.getElementById('loading-text').textContent = txt;
    document.getElementById('loading').classList.toggle('show', on);
}

function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
}

// ── NAME NORMALIZATION (para comparação de duplicatas) ─────────────
function normalizeName(name) {
    return name.trim().toLowerCase().replace(/\s+/g, ' ');
}

// ── DEBOUNCE ──────────────────────────────────────────────────────
const debounceTimers = {};
function debounce(key, fn, delay = 600) {
    clearTimeout(debounceTimers[key]);
    debounceTimers[key] = setTimeout(fn, delay);
}

// ── REGISTER VALIDATION ───────────────────────────────────────────
let regNameOk = false, regEmailOk = false;

async function checkRegName() {
    const val = document.getElementById('r-name').value.trim();
    const hint = document.getElementById('r-name-hint');
    const inp  = document.getElementById('r-name');
    regNameOk = false;
    if (!val) { hint.textContent = ''; inp.className = ''; return; }
    if (val.length < 3) { hint.textContent = 'Mínimo 3 caracteres.'; hint.className = 'field-hint err'; inp.className = 'field-err'; return; }

    hint.textContent = 'Verificando...'; hint.className = 'field-hint';
    // Verifica duplicata no Firebase (normalizado)
    const snap = await db.ref('usernames').once('value');
    const existing = snap.val() || {};
    const norm = normalizeName(val);
    const taken = Object.values(existing).some(n => normalizeName(n) === norm);
    if (taken) {
        hint.textContent = 'Nome já em uso.'; hint.className = 'field-hint err'; inp.className = 'field-err';
    } else {
        hint.textContent = 'Disponível!'; hint.className = 'field-hint ok'; inp.className = 'field-ok';
        regNameOk = true;
    }
}

async function checkRegEmail() {
    const val = document.getElementById('r-email').value.trim();
    const hint = document.getElementById('r-email-hint');
    const inp  = document.getElementById('r-email');
    regEmailOk = false;
    if (!val) { hint.textContent = ''; inp.className = ''; return; }
    if (!/\S+@\S+\.\S+/.test(val)) { hint.textContent = 'E-mail inválido.'; hint.className = 'field-hint err'; inp.className = 'field-err'; return; }

    hint.textContent = 'Verificando...'; hint.className = 'field-hint';
    const snap = await db.ref('emails').once('value');
    const existing = snap.val() || {};
    const taken = Object.values(existing).some(e => e.toLowerCase() === val.toLowerCase());
    if (taken) {
        hint.textContent = 'E-mail já cadastrado.'; hint.className = 'field-hint err'; inp.className = 'field-err';
    } else {
        hint.textContent = 'Disponível!'; hint.className = 'field-hint ok'; inp.className = 'field-ok';
        regEmailOk = true;
    }
}

async function doRegister() {
    const name  = document.getElementById('r-name').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const pass  = document.getElementById('r-pass').value;
    if (!name || !email || !pass) { showError('reg-err', 'Preencha todos os campos.'); return; }
    if (!regNameOk)  { showError('reg-err', 'Escolha um nome disponível.'); return; }
    if (!regEmailOk) { showError('reg-err', 'Use um e-mail disponível.'); return; }
    if (pass.length < 8) { showError('reg-err', 'Senha mínima de 8 caracteres.'); return; }

    showLoading(true, 'Criando conta...');
    try {
        const result = await auth.createUserWithEmailAndPassword(email, pass);
        const uid = result.user.uid;
        const safeUid = uid.replace(/[.@\/]/g, '_');
        // Salva nome, email e perfil
        await Promise.all([
            db.ref('usernames/' + safeUid).set(name),
            db.ref('emails/' + safeUid).set(email),
            db.ref('profiles/' + safeUid).set({ name, email, bio: '', loginType: 'email', createdAt: Date.now() })
        ]);
        finishLogin(name, email, uid);
    } catch(e) {
        showLoading(false);
        showError('reg-err', e.message);
    }
}

// ── LOGIN ─────────────────────────────────────────────────────────
async function doLogin() {
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value;
    if (!email || !pass) { showError('login-err', 'Preencha todos os campos.'); return; }
    showLoading(true);
    try {
        const result = await auth.signInWithEmailAndPassword(email, pass);
        const uid = result.user.uid;
        const safeUid = uid.replace(/[.@\/]/g, '_');
        const nameSnap = await db.ref('usernames/' + safeUid).once('value');
        const name = nameSnap.val() || email.split('@')[0];
        finishLogin(name, email, uid);
    } catch(e) {
        showLoading(false);
        if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
            showError('login-err', 'E-mail ou senha inválidos.');
        } else {
            showError('login-err', e.message);
        }
    }
}

// ── GOOGLE ────────────────────────────────────────────────────────
let pendingGoogleUser = null;

function loginGoogle() {
    showLoading(true);
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).then(async result => {
        const user = result.user;
        if (!user.email) { auth.signOut(); showLoading(false); showError('login-err', 'É necessário um e-mail para acessar.'); return; }

        const safeUid = user.uid.replace(/[.@\/]/g, '_');

        // Verifica ban
        const banSnap = await db.ref('admin/banned/' + safeUid).once('value');
        if (banSnap.val() === true) { auth.signOut(); showLoading(false); showError('login-err', 'Conta suspensa.'); return; }

        // Verifica se já tem nome (usuário existente)
        const nameSnap = await db.ref('usernames/' + safeUid).once('value');
        if (nameSnap.val()) {
            finishLogin(nameSnap.val(), user.email, user.uid);
        } else {
            // Primeira vez — pede nome
            showLoading(false);
            pendingGoogleUser = user;
            document.getElementById('name-overlay').classList.add('show');
        }
    }).catch(e => { showLoading(false); showError('login-err', 'Erro Google: ' + e.message); });
}

// ── GOOGLE NAME PICKER ────────────────────────────────────────────
let googleNameOk = false;
let googleNameTimer = null;

async function checkGoogleName() {
    const val = document.getElementById('g-name').value.trim();
    const hint = document.getElementById('g-name-hint');
    const btn  = document.getElementById('g-name-btn');
    googleNameOk = false; btn.disabled = true;
    if (!val || val.length < 3) { hint.textContent = val ? 'Mínimo 3 caracteres.' : ''; hint.className = 'field-hint err'; return; }
    clearTimeout(googleNameTimer);
    googleNameTimer = setTimeout(async () => {
        hint.textContent = 'Verificando...'; hint.className = 'field-hint';
        const snap = await db.ref('usernames').once('value');
        const existing = snap.val() || {};
        const norm = normalizeName(val);
        const taken = Object.values(existing).some(n => normalizeName(n) === norm);
        if (taken) {
            hint.textContent = 'Nome já em uso.'; hint.className = 'field-hint err';
        } else {
            hint.textContent = 'Disponível!'; hint.className = 'field-hint ok';
            googleNameOk = true; btn.disabled = false;
        }
    }, 600);
}

async function confirmGoogleName() {
    if (!googleNameOk || !pendingGoogleUser) return;
    const name = document.getElementById('g-name').value.trim();
    const user = pendingGoogleUser;
    const safeUid = user.uid.replace(/[.@\/]/g, '_');
    showLoading(true, 'Configurando conta...');
    document.getElementById('name-overlay').classList.remove('show');
    await Promise.all([
        db.ref('usernames/' + safeUid).set(name),
        db.ref('emails/' + safeUid).set(user.email),
        db.ref('profiles/' + safeUid).set({ name, email: user.email, bio: '', loginType: 'google', createdAt: Date.now() })
    ]);
    finishLogin(name, user.email, user.uid);
}

// ── FINISH LOGIN ──────────────────────────────────────────────────
async function finishLogin(name, email, uid) {
    const safeUid = uid.replace(/[.@\/]/g, '_');
    // Ban check
    const banSnap = await db.ref('admin/banned/' + safeUid).once('value');
    if (banSnap.val() === true) {
        auth.signOut(); showLoading(false);
        showError('login-err', 'Sua conta foi suspensa. Contate o suporte.');
        return;
    }
    localStorage.setItem('antro_user', name);
    localStorage.setItem('antro_email', email);
    localStorage.setItem('antro_uid', uid);
    localStorage.setItem('is_logged', 'true');
    window.location.replace('home.html');
}
</script>
</body>
</html>
