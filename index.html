<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AntropAi | Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b000b;
            --accent: #ff0040;
            --purple: #7a00ff;
            --ai-gradient: linear-gradient(45deg, #ff0040, #7a00ff);
            --card: #130013;
            --border: #2a002a;
            --input-bg: #1a001a;
            --text: #ffffff;
            --subtext: #664466;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(122,0,255,0.18) 0%, transparent 70%);
            top: -80px; right: -80px;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,0,64,0.12) 0%, transparent 70%);
            bottom: -60px; left: -60px;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(122,0,255,0.1) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -2s;
        }
        @keyframes drift {
            from { transform: scale(1) translateY(0px); }
            to   { transform: scale(1.1) translateY(-20px); }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 44px 40px 40px;
            width: 360px;
            box-shadow: 0 0 60px rgba(122,0,255,0.1), 0 0 120px rgba(255,0,64,0.05);
            animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .logo-text .grad {
            background: var(--ai-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-sub {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--subtext);
            letter-spacing: 3px;
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--input-bg);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--subtext);
            transition: all 0.25s ease;
            user-select: none;
        }
        .tab.active {
            background: var(--border);
            color: var(--text);
            box-shadow: 0 0 12px rgba(255,0,64,0.15);
        }

        /* Form */
        .form { display: flex; flex-direction: column; gap: 12px; }
        .hidden { display: none !important; }

        .input-wrap {
            position: relative;
            animation: fadeField 0.3s ease both;
        }
        @keyframes fadeField {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .input-wrap:nth-child(2) { animation-delay: 0.06s; }

        .input-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--subtext);
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder { color: #3a003a; }
        input:focus {
            border-color: #440044;
            box-shadow: 0 0 0 3px rgba(122,0,255,0.1);
        }

        /* Error message */
        .error-msg {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            text-align: center;
            min-height: 16px;
            animation: shake 0.3s ease;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25%      { transform: translateX(-6px); }
            75%      { transform: translateX(6px); }
        }

        /* Button */
        .btn {
            width: 100%;
            background: var(--ai-gradient);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(255,0,64,0.2);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }
        .btn:hover { opacity: 0.9; box-shadow: 0 6px 32px rgba(255,0,64,0.35); transform: translateY(-1px); }
        .btn:active { transform: scale(0.98); }

        /* Footer note */
        .footer-note {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: #2a002a;
            text-align: center;
            margin-top: 22px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card">
    <div class="logo">
        <div class="logo-text">Antrop<span class="grad">Ai</span></div>
        <div class="logo-sub">Your personal intelligence</div>
    </div>

    <div class="tabs">
        <div id="t-login" class="tab active" onclick="toggle('login')">LOGIN</div>
        <div id="t-reg" class="tab" onclick="toggle('reg')">REGISTER</div>
    </div>

    <!-- LOGIN -->
    <div id="f-login" class="form">
        <div class="input-wrap">
            <label class="input-label">Username</label>
            <input type="text" id="l-user" placeholder="your_username" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div class="input-wrap">
            <label class="input-label">Password</label>
            <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <div id="login-err" class="error-msg"></div>
        <button class="btn" onclick="doLogin()">Enter</button>
    </div>

    <!-- REGISTER -->
    <div id="f-reg" class="form hidden">
        <div class="input-wrap">
            <label class="input-label">Username</label>
            <input type="text" id="r-user" placeholder="choose_a_username" onkeydown="if(event.key==='Enter') doRegister()">
        </div>
        <div class="input-wrap">
            <label class="input-label">Password</label>
            <input type="password" id="r-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doRegister()">
        </div>
        <div id="reg-err" class="error-msg"></div>
        <button class="btn" onclick="doRegister()">Create Account</button>
    </div>

    <div class="footer-note">secured via firebase · no local storage</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.0/firebase-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@8.10.0/firebase-database.js"></script>
    <script>
    const _0xdb = "aHR0cHM6Ly9hbGVhdG9yaWEtNGNkNDYtZGVmYXVsdC1ydGRiLmZpcmViYXNlaW8uY29tLw==";

    // Auto-login: se já estiver logado, vai direto pro chat
    if (localStorage.getItem('is_logged') === 'true' && localStorage.getItem('antro_user')) {
        window.location.replace('home.html');
    }

    firebase.initializeApp({ databaseURL: atob(_0xdb) });
    const db = firebase.database();

    function toggle(mode) {
        document.getElementById('f-login').classList.toggle('hidden', mode === 'reg');
        document.getElementById('f-reg').classList.toggle('hidden', mode === 'login');
        document.getElementById('t-login').classList.toggle('active', mode === 'login');
        document.getElementById('t-reg').classList.toggle('active', mode === 'reg');
        document.getElementById('login-err').textContent = '';
        document.getElementById('reg-err').textContent = '';
    }

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
    }

    async function doRegister() {
        const u = document.getElementById('r-user').value.trim().toLowerCase();
        const p = document.getElementById('r-pass').value.trim();
        if (!u || !p) { showError('reg-err', 'Fill in all fields.'); return; }
        if (p.length < 8) { showError('reg-err', 'Password must be at least 8 characters.'); return; }

        // Check if username already exists
        const snap = await db.ref('users/' + u).once('value');
        if (snap.val()) { showError('reg-err', 'Username already taken.'); return; }

        await db.ref('users/' + u).set({ password: p });
        localStorage.setItem('antro_user', u);
        localStorage.setItem('is_logged', 'true');
        window.location.href = "home.html";
    }

    async function doLogin() {
        const u = document.getElementById('l-user').value.trim().toLowerCase();
        const p = document.getElementById('l-pass').value.trim();
        if (!u || !p) { showError('login-err', 'Fill in all fields.'); return; }

        const snapshot = await db.ref('users/' + u).once('value');
        const userData = snapshot.val();
        if (userData && userData.password === p) {
            localStorage.setItem('antro_user', u);
            localStorage.setItem('is_logged', 'true');
            window.location.href = "home.html";
        } else {
            showError('login-err', 'Usuário ou senha inválidos.');
        }
    }
</script>
</body>
</html>
